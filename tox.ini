[tox]
envlist =
    tests_coverage
    check_format


[testenv:tests_coverage]
deps =
    pytest
    coverage
    requests
commands =
    coverage erase
    # Config is all specified in .coveragerc
    coverage run -m pytest --doctest-modules
    coverage combine
    coverage html
    coverage report
commands_post =
    coverage erase


[testenv:check_format]
deps = black>=23.1.0
skip_install = true
commands = black --check .


[testenv:publish_package]
setenv =
    TWINE_USERNAME = __token__
passenv =
    TWINE_PASSWORD
allowlist_externals =
    rm
deps =
    build
    twine
commands =
    - rm -rf dist
    python -m build --wheel
    python -m build --sdist
    python -m twine upload dist/*
