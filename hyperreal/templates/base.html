<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    {% block head %}
    <title>{% block title %}{% endblock %}</title>
    {% endblock %}

    <style type="text/css">

body {
    margin: 0;
}

main {
    margin: 0 1em;
}
.cluster-list {
    display: flex;
    flex-wrap: wrap;
    list-style-type: none;
    padding: 0;
    margin: 0 -0.5em;
}

.cluster-list > li {
    flex: 1 1 40ch;
    margin: 1em 0.5em;
    box-shadow: 0 0 0.1em 0.1em gray;
    border-radius: 0.4em;
    justify-content: space-between;
    padding-left: 0;
    background: #f6f6f6;
}

.highlight {
    border: 0.2em solid orange;
    border-radius: 0.4em;
}

.pinned {
    border: 0.2em solid blue;
    border-radius: 0.4em;   
}

.compact-cluster {
    max-width: 80em;
    margin: 0.25em;
    padding: 0;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
}

.compact-cluster li {
    display: inline-block;
    list-style-type: none;
    margin: 0.25em;
    padding: 0;
}

.compact-cluster li:last-of-type {
    margin-right: auto;
}

.cluster-footer {
    margin: 1em 0.5em;
}

.cluster-header {
    background: black;
    color: white;
    border-radius: 0.4em 0.4em 0 0;
    padding: 0 0.5em;
}

.doc-list {
    padding: 0;
    list-style-type: none;
}

.doc-list > li {
    margin: 0.75em 0.5em;
    background-color: white;
    list-style-type: none;
    padding: 0.5em;
    border-radius: 0.4em;
}

.concordances {
    padding: 0;
    margin: 0;

}

.concordance-line {
    list-style-type: none;
    padding: 0;
    margin: 0;
    margin-bottom: 0.5em;
}

img {
    max-width: 100%;
}

.feature {
    position: relative;
    box-shadow: 0.05em 0.05em 0.05em 0.05em gray;
    border-radius: 0.4em;
    display: inline-block;
    margin: 0;
    margin-bottom: 0.5em;
    min-width: 4.5ch;
    background: white;

}

.field {
    position: absolute;
    left: 0.1em;
    top: 0.1em;
    color: black;
    padding: 0.1em;
    margin: 0;
    font-size: 50%;
}

.value {
    padding: 0.75em 0.5em;
    text-align: center;
}

.score {
    color: black;
    font-size: 50%;
    padding: 0.1em;
    position: absolute;
    right: 0.1em;
    bottom: 0.1em;
    display: table-cell;
}

.concordance-table {
    background: white;
}

table {
    border-collapse: collapse;
    border-top: 0.1em solid black;
    border-bottom: 0.1em solid black;
    margin: 0.5em;
}

thead {
    border-bottom: 0.1em solid black;
}

tbody > tr:nth-of-type(odd) {background: #f6f6f6}

tr > * {
    vertical-align: top;
}

th, td {
    padding: 0.5em;
}


section {
    margin: 2em 0;
}


.nav-links {
    display: flex;
    flex-wrap: wrap;
    list-style-type: none;
    margin: 0;
    padding-left: 0;
}

.nav-links li {
    margin-right: 1em;
}

header {
    position: sticky;
    top: 0;
    background: lightblue;
    z-index: 1;
    padding: 0.5em 1em;
}

h1 {
    margin-bottom: 1rem;
    margin-right: 1rem;
}

.matching-features > dt {
    grid-column-start: 1;
    text-align: right;
    font-weight: bold ;
}

.matching-features > dd {
    grid-column-start: 2;
    margin: 0 0.5em;
}

.matching-features > dt::after {
    content: ":";
}

.matching-features {
  display: grid;
  grid-template-columns: max-content auto;
}

.document {
    max-width: 100%;
}

.switcher {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
}

.switcher > * {
  flex-grow: 1;
  flex-basis: calc(( 50rem - 100%) * 999);
}

.switcher > :nth-last-child( n+ 3),
.switcher > :nth-last-child( n+ 3) ~ * {
  flex-basis: 100%;
}

    </style>

    {% block meta %}
    {% endblock %}
</head>

<body>
    <header>
        <nav>
            <ul class="nav-links">
                <li><a href="/index/{{ index_id }}">Overview</a></li>
                <li><a href="/index/{{ index_id }}/info">Index Info</a></li>
                <li><a href="/index/{{ index_id }}/create">Create New Clusters</a></li>
                <li><a href="/index/{{ index_id }}/delete_all">Delete All Clusters</a></li>
                {% block nav %}
                {% endblock %}
            </ul>
        </nav>
    </header>
    <main>{% block content %}{% endblock %}</main>
</body>
</html>
